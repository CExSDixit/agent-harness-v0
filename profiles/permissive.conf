# Agent Harness v0 — Permissive network profile
# Allows ALL outbound internet traffic. Use only when you explicitly need
# unrestricted outbound access (e.g., broad web research, unfamiliar dependency sources).
#
# This profile is NOT the default and should not be used routinely.
# Prefer a scoped profile (default, python-dev, etc.) and hot-add domains as needed.
#
# What this does:
#   - Allows all outbound TCP/UDP to the internet
#   - Still blocks access to the Docker host network (prevents container-to-host access)
#   - Localhost traffic within the container is allowed
#
# This is a SPECIAL profile — it does not use the ipset allowlist.
# init-firewall.sh detects this profile name and applies permissive rules instead.
